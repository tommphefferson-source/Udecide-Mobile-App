openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: elections
    description: Elections and voter information (Google Civic backed)
  - name: polls
    description: Community polls
  - name: home
    description: App home metadata
  - name: news
    description: News feed
  - name: civics
    description: Quizzes, questionnaires, terminology and party reference data
  - name: auth
    description: User authentication (legacy WS backed)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /elections:
    get:
      operationId: getElections
      tags: [elections]
      summary: List available elections
      description: Live Google Civic elections list.
      responses:
        "200":
          description: Election list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Elections"
        "502":
          description: Upstream provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /elections/voter-info:
    get:
      operationId: getVoterInfo
      tags: [elections]
      summary: Voter information for an address
      description: Live Google Civic voter information for the supplied address and election.
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
        - name: electionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Voter information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoterInfo"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /polls:
    get:
      operationId: listPolls
      tags: [polls]
      summary: List polls
      responses:
        "200":
          description: Poll list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollList"

  /polls/{pollId}/vote:
    post:
      operationId: votePoll
      tags: [polls]
      summary: Submit a vote for a poll
      parameters:
        - name: pollId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollVoteInput"
      responses:
        "200":
          description: Updated poll results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResults"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Poll or option not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /polls/{pollId}/results:
    get:
      operationId: getPollResults
      tags: [polls]
      summary: Get poll results
      parameters:
        - name: pollId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Poll results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResults"
        "404":
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate a user against the legacy server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginInput"
      responses:
        "200":
          description: Authenticated user with token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user against the legacy server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSignUpInput"
      responses:
        "200":
          description: Newly registered user with token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request or registration rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/profile:
    post:
      operationId: updateProfile
      tags: [auth]
      summary: Update the authenticated user's profile on the legacy server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthProfileUpdateInput"
      responses:
        "200":
          description: Updated user with token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request or update rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or rejected auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /home:
    get:
      operationId: getHome
      tags: [home]
      summary: App home metadata
      responses:
        "200":
          description: Home data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeData"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: News feed
      responses:
        "200":
          description: News response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /quiz:
    get:
      operationId: getQuiz
      tags: [civics]
      summary: Civics quiz with questions
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CivicsQuiz"

  /quizzes:
    get:
      operationId: listQuizzes
      tags: [civics]
      summary: List quizzes / quiz menu
      responses:
        "200":
          description: Quiz list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizList"

  /quizzes/progress:
    post:
      operationId: submitQuizProgress
      tags: [civics]
      summary: Submit quiz progress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizProgressInput"
      responses:
        "200":
          description: Progress recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizProgressResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /questionnaires:
    get:
      operationId: listQuestionnaires
      tags: [civics]
      summary: List questionnaires
      responses:
        "200":
          description: Questionnaire list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireList"

  /terminology:
    get:
      operationId: listTerminology
      tags: [civics]
      summary: List political terminology
      responses:
        "200":
          description: Terminology list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminologyList"

  /parties:
    get:
      operationId: listParties
      tags: [civics]
      summary: List political parties
      responses:
        "200":
          description: Party list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthUser:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        stateId:
          type: string
        zipCode:
          type: string
        phoneNumber:
          type: string
        profileImage:
          type: string
        status:
          type: string
      required:
        - userId
        - email
        - firstName
        - lastName

    AuthResponse:
      type: object
      properties:
        authToken:
          type: string
          minLength: 1
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - authToken
        - user

    AuthLoginInput:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - email
        - password

    AuthSignUpInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        stateId:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        zipCode:
          type: string
          minLength: 1
        phone:
          type: string
      required:
        - firstName
        - lastName
        - email
        - password
        - stateId
        - city
        - zipCode

    AuthProfileUpdateInput:
      type: object
      description: >-
        Partial profile update for the authenticated user. `state` is the
        2-letter US abbreviation; the server maps it to the legacy numeric
        state id. All fields are optional so partial updates are allowed.
      properties:
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        phone:
          type: string

    Election:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        electionDay:
          type: string
        ocdDivisionId:
          type: ["string", "null"]
      required:
        - id
        - name
        - electionDay

    Elections:
      type: object
      properties:
        elections:
          type: array
          items:
            $ref: "#/components/schemas/Election"
      required:
        - elections

    SocialChannel:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
      required:
        - type
        - id

    Candidate:
      type: object
      properties:
        name:
          type: string
        party:
          type: ["string", "null"]
        candidateUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        channels:
          type: array
          items:
            $ref: "#/components/schemas/SocialChannel"
      required:
        - name
        - channels

    Contest:
      type: object
      properties:
        type:
          type: string
        office:
          type: ["string", "null"]
        level:
          type: ["string", "null"]
        districtScope:
          type: ["string", "null"]
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - type
        - candidates

    CorrespondenceAddress:
      type: object
      properties:
        line1:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        zip:
          type: ["string", "null"]

    StateAdministration:
      type: object
      properties:
        name:
          type: ["string", "null"]
        electionInfoUrl:
          type: ["string", "null"]
        votingLocationFinderUrl:
          type: ["string", "null"]
        ballotInfoUrl:
          type: ["string", "null"]
        correspondenceAddress:
          $ref: "#/components/schemas/CorrespondenceAddress"

    PollingLocation:
      type: object
      properties:
        name:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        hours:
          type: ["string", "null"]
      required: []

    VoterInfo:
      type: object
      properties:
        address:
          type: string
        electionId:
          type: ["string", "null"]
        state:
          $ref: "#/components/schemas/StateAdministration"
        contests:
          type: array
          items:
            $ref: "#/components/schemas/Contest"
        pollingLocations:
          type: array
          items:
            $ref: "#/components/schemas/PollingLocation"
      required:
        - address
        - contests
        - pollingLocations

    PollOption:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        votes:
          type: integer
      required:
        - id
        - label
        - votes

    Poll:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        totalVotes:
          type: integer
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOption"
      required:
        - id
        - question
        - totalVotes
        - options

    PollList:
      type: object
      properties:
        polls:
          type: array
          items:
            $ref: "#/components/schemas/Poll"
      required:
        - polls

    PollVoteInput:
      type: object
      properties:
        optionId:
          type: string
          minLength: 1
      required:
        - optionId

    PollResultOption:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        votes:
          type: integer
        percentage:
          type: number
      required:
        - id
        - label
        - votes
        - percentage

    PollResults:
      type: object
      properties:
        pollId:
          type: string
        question:
          type: string
        totalVotes:
          type: integer
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollResultOption"
      required:
        - pollId
        - question
        - totalVotes
        - options

    HomeSection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        route:
          type: ["string", "null"]
      required:
        - id
        - title

    HomeData:
      type: object
      properties:
        appName:
          type: string
        environment:
          type: string
        newsUrl:
          type: string
        lastUpdated:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/HomeSection"
      required:
        - appName
        - environment
        - newsUrl
        - lastUpdated
        - sections

    NewsArticle:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        source:
          type: string
        url:
          type: string
        publishedAt:
          type: string
        content:
          type: string
          description: Plain-text article body for in-app reading (paragraphs separated by blank lines).
        imageUrl:
          type: string
          description: Lead image URL extracted from the feed item, if any.
        author:
          type: string
          description: Article author/byline, if provided by the feed.
      required:
        - id
        - title
        - description
        - source
        - url
        - publishedAt

    NewsResponse:
      type: object
      properties:
        newsUrl:
          type: string
        title:
          type: string
        description:
          type: string
        source:
          type: string
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
      required:
        - newsUrl
        - title
        - description
        - source
        - articles

    Quiz:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        questionCount:
          type: integer
      required:
        - id
        - title
        - category
        - questionCount

    QuizList:
      type: object
      properties:
        quizzes:
          type: array
          items:
            $ref: "#/components/schemas/Quiz"
      required:
        - quizzes

    CivicsQuizQuestion:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        answerIndex:
          type: integer
        explanation:
          type: string
      required:
        - id
        - question
        - options
        - answerIndex
        - explanation

    CivicsQuiz:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        questions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CivicsQuizQuestion"
      required:
        - id
        - title
        - description
        - questions

    QuizProgressInput:
      type: object
      properties:
        quizId:
          type: string
          minLength: 1
        userId:
          type: string
        score:
          type: integer
        completed:
          type: boolean
      required:
        - quizId
        - completed

    QuizProgressResult:
      type: object
      properties:
        success:
          type: boolean
        quizId:
          type: string
        recordedAt:
          type: string
      required:
        - success
        - quizId
        - recordedAt

    QuestionnaireQuestion:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        options:
          type: array
          items:
            type: string
      required:
        - id
        - prompt
        - options

    Questionnaire:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionnaireQuestion"
      required:
        - id
        - title
        - questions

    QuestionnaireList:
      type: object
      properties:
        questionnaires:
          type: array
          items:
            $ref: "#/components/schemas/Questionnaire"
      required:
        - questionnaires

    TerminologyItem:
      type: object
      properties:
        id:
          type: string
        term:
          type: string
        definition:
          type: string
        category:
          type: ["string", "null"]
      required:
        - id
        - term
        - definition

    TerminologyList:
      type: object
      properties:
        terms:
          type: array
          items:
            $ref: "#/components/schemas/TerminologyItem"
      required:
        - terms

    Party:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        abbreviation:
          type: ["string", "null"]
        description:
          type: string
        foundedYear:
          type: ["integer", "null"]
        website:
          type: ["string", "null"]
      required:
        - id
        - name
        - description

    PartyList:
      type: object
      properties:
        parties:
          type: array
          items:
            $ref: "#/components/schemas/Party"
      required:
        - parties
